[pytest]
# Companion test config. Repo root on sys.path so `companions.chXX...` imports
# resolve (the companions are run with PYTHONPATH=. by convention); tests live
# beside the code under companions/chXX/{jax,torch}/tests/. Run via the venv:
#   .venv/bin/pytest            (or `make companion-jax-tests`)
pythonpath = .
testpaths = companions
python_files = test_*.py
addopts = -q
