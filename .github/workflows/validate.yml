name: Validate

# Content-discipline gate for ssm-foundations: validate + lint + status-check
# (composed as `make check`). Runs on every push and PR — including
# docs-only paths that deploy.yml's paths filter excludes — so structural
# changes to chapters/, docs/, audits/, etc. still get content validation
# even when no deploy fires.
#
# Build is owned by deploy.yml (it runs `npm run build` via the reusable
# workflow). Keeping the build out of this file avoids redundant CI work.
#
# Audit references: F14 (Track C initial validate.yml), Phase 1c Q3.C
# (slim from build-running to make-check-only).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: "Content validation + lint + status-check (make check)"
        run: make check
