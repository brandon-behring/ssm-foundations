name: Deploy

# Deploys ssm-foundations to Cloudflare Workers + Static Assets via the
# reusable workflow at brandon-behring/deploy-workflows. Mirrors DML's
# Phase 1b pattern, flattened (no working-directory; ssm is single-package).
#
# paths filter: only push events touching source / build inputs trigger a
# deploy. Docs (docs/), audits (audits/), companion source (companions/),
# and CLAUDE.md edits are deploy-irrelevant; validate.yml handles those for
# content-discipline validation.
#
# No preview-on-PR job (Phase 1c Q2.B): solo-dev repo, no PR previews
# consumer today. Trivial to add back when a contributor PR shows up.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'astro.config.mjs'
      - 'wrangler.jsonc'
      - 'bibliography.bib'
      - '.github/workflows/deploy.yml'

permissions:
  contents: read
  deployments: write
  actions: read

jobs:
  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: brandon-behring/deploy-workflows/.github/workflows/deploy-astro-worker.yml@v1
    secrets: inherit
    with:
      # v4.6.0 migration (2026-05-27): reverted ci:validate → validate.
      # The book-scaffold-astro v4.6 release introduces the prevalidate
      # npm-lifecycle hook convention (see recipes/19-prevalidate-hook.md):
      # `npm run validate` now auto-runs the `prevalidate` hook first,
      # which regenerates src/data/references.json + labels.json. The
      # historical ci:validate wrapper (band-aid fix from Phase 1c) is
      # no longer needed — same CI behavior, cleaner package.json.
      #
      # Historical context: audits/2026-05-26_first-deploy.md documents
      # the original ci:validate latent-gap investigation. ssm's .env
      # tracks BOOK_PROFILE=academic so validate picks up the profile.
      validate-command: validate
